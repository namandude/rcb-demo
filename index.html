<!DOCTYPE html>
<html>
<head>
    <title>RCB Demo</title>

    <style>
        body {
            background-color: #0c0c0c;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            gap: 20px;
        }

        .pur-tck-blk a {
            text-decoration: none;
        }

        .buy-tck-spn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            color: white;
            transition: 0.3s;
        }

        .merch {
            background: linear-gradient(45deg, #d4af37, #f1c40f);
        }

        .ticket {
            background: linear-gradient(45deg, #ff1e1e, #b30000);
        }

        .info {
            background: linear-gradient(45deg, #1e90ff, #0047ab);
        }

        .extra1 {
            background: linear-gradient(45deg, #28a745, #145c2a);
        }

        .extra2 {
            background: linear-gradient(45deg, #ff7f50, #c94c1a);
        }
        .extra2 {
            background: linear-gradient(48deg, #ff7f50, #ff7f50);
        }
        .buy-tck-spn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="pur-tck-blk">
        <a href="https://shop.royalchallengers.com/merchandise">
            <span class="buy-tck-spn merch">BUY MERCHANDISE</span>
        </a>
    </div>
<div class="pur-tck-blk">
        <a href="https://shop.royalchallengers.com/merchandise">
            <span class="buy-tck-spn merch">sdds sdsd</span>
        </a>
    </div>
    <div class="pur-tck-blk">
        <a href="https://shop.royalchallengers.com/ticket">
            <span class="buy-tck-spn ticket">BUY TICKETS</span>
        </a>
    </div>

    <div class="pur-tck-blk">
        <a href="#">
            <span class="buy-tck-spn info">VIEW DETAILS</span>
        </a>
    </div>

    <!-- New Buttons -->
    <div class="pur-tck-blk">
        <a href="#">
            <span class="buy-tck-spn extra1">rcbb jkjk</span>
        </a>
    </div>

    <div class="pur-tck-blk">
        <a href="#">
            <span class="buy-tck-spn extra1">rcbb jkjk</span>
        </a>
    </div>
    <div class="pur-tck-blk">
        <a href="#">
            <span class="buy-tck-spn extra2">VIRAT BHAI</span>
        </a>
    </div>
    
    <div class="pur-tck-blk">
        <a href="#">
            <span class="buy-tck-spn extra1">MATCH SCHEDULE</span>
        </a>
    </div>

    <div class="pur-tck-blk">
        <a href="#">
            <span class="buy-tck-spn extra2">TEAM INFO</span>
        </a>
    </div>
    <div class="pur-tck-blk">
        <a href="#">
            <span class="buy-tck-spn extra5">Tickey ayaoo</span>
        </a>
    </div>    
    <div class="pur-tck-blk">
        <a href="#">
            <span class="buy-tck-spn extra3">POINTS TABLE</span>
        </a>
    </div>
</body>
</html>
